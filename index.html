<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e11;
      --panel: #17171c;
      --border: #2a2a35;
      --display-bg: #0a0a0d;
      --accent: #c8ff00;
      --accent-dim: #8db300;
      --text: #e8e8f0;
      --muted: #555566;
      --btn-num: #1e1e26;
      --btn-num-hover: #28283a;
      --btn-op: #1e2a10;
      --btn-op-hover: #2c3d18;
      --btn-clear: #2a1010;
      --btn-clear-hover: #3d1a1a;
      --shadow: 0 24px 60px rgba(0,0,0,0.6);
      --radius: 20px;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Syne', sans-serif;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(200,255,0,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(200,255,0,0.03) 0%, transparent 60%);
    }

    .calc-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .label {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      align-self: flex-start;
      padding-left: 4px;
    }

    .calculator {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 340px;
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
      position: relative;
      overflow: hidden;
    }

    .calculator::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
    }

    /* Display */
    .display {
      background: var(--display-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px 12px;
      margin-bottom: 20px;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
      gap: 4px;
      overflow: hidden;
    }

    .expression {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
      word-break: break-all;
      text-align: right;
      transition: color 0.2s;
    }

    .result {
      font-family: 'Share Tech Mono', monospace;
      font-size: 38px;
      color: var(--text);
      word-break: break-all;
      text-align: right;
      line-height: 1;
      transition: font-size 0.15s, color 0.2s;
    }

    .result.accent { color: var(--accent); }

    /* Buttons grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 0;
      cursor: pointer;
      color: var(--text);
      background: var(--btn-num);
      transition: background 0.15s, transform 0.08s, box-shadow 0.15s, color 0.15s;
      position: relative;
      overflow: hidden;
      user-select: none;
    }

    button:active { transform: scale(0.94); }

    button.op {
      background: var(--btn-op);
      color: var(--accent);
      border-color: #3a4a20;
    }
    button.op:hover { background: var(--btn-op-hover); box-shadow: 0 0 12px rgba(200,255,0,0.12); }

    button.clear {
      background: var(--btn-clear);
      color: #ff6b6b;
      border-color: #3a1515;
    }
    button.clear:hover { background: var(--btn-clear-hover); box-shadow: 0 0 12px rgba(255,100,100,0.1); }

    button.equals {
      background: var(--accent);
      color: #0e0e11;
      border-color: var(--accent);
      grid-column: span 2;
      font-size: 20px;
    }
    button.equals:hover { background: #d9ff1a; box-shadow: 0 0 20px rgba(200,255,0,0.3); }

    button.num:hover { background: var(--btn-num-hover); }

    button.zero { grid-column: span 1; }

    /* Ripple effect */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      transform: scale(0);
      animation: ripple-anim 0.4s linear;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* Result flash */
    @keyframes flash {
      0% { color: var(--accent); }
      100% { color: var(--text); }
    }
  </style>
</head>
<body>

<div class="calc-wrap">
  <div class="label">Calculator</div>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <!-- Row 1 -->
      <button class="clear" onclick="clearAll()" style="grid-column: span 3;">AC</button>
      <button class="op" onclick="inputOp('/')">÷</button>

      <!-- Row 2 -->
      <button class="num" onclick="inputNum('7')">7</button>
      <button class="num" onclick="inputNum('8')">8</button>
      <button class="num" onclick="inputNum('9')">9</button>
      <button class="op" onclick="inputOp('*')">×</button>

      <!-- Row 3 -->
      <button class="num" onclick="inputNum('4')">4</button>
      <button class="num" onclick="inputNum('5')">5</button>
      <button class="num" onclick="inputNum('6')">6</button>
      <button class="op" onclick="inputOp('-')">−</button>

      <!-- Row 4 -->
      <button class="num" onclick="inputNum('1')">1</button>
      <button class="num" onclick="inputNum('2')">2</button>
      <button class="num" onclick="inputNum('3')">3</button>
      <button class="op" onclick="inputOp('+')">+</button>

      <!-- Row 5 -->
      <button class="num zero" onclick="inputNum('0')">0</button>
      <button class="num" onclick="inputDot()">.</button>
      <button class="equals" onclick="calculate()">=</button>
    </div>
  </div>
</div>

<script>
  let expr = '';

  const resultEl = document.getElementById('result');
  const exprEl = document.getElementById('expression');

  function inputNum(n) {
    expr += n;
    resultEl.textContent = expr;
  }

  function inputOp(op) {
    expr += op;
    resultEl.textContent = expr;
  }

  function inputDot() {
    expr += '.';
    resultEl.textContent = expr;
  }

  function clearAll() {
    expr = '';
    resultEl.textContent = '0';
    exprEl.textContent = '';
  }

  function calculate() {
    try {
      const res = eval(expr);
      exprEl.textContent = expr + ' =';
      resultEl.textContent = res;
      expr = String(res);
    } catch {
      resultEl.textContent = 'Error';
      expr = '';
    }
  }
</script>
</body>
</html>
